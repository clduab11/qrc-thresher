name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-health:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies from lock
        run: uv pip sync uv.lock

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Unit tests (pytest, fast)
        run: pytest -q

      - name: Health check (G0 source/benchmark health)
        run: qrc-thresher health --out-dir results/health

      - name: Minimal gate profile (G0 must eventually pass)
        run: qrc-thresher gate G0
