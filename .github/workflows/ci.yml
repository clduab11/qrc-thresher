name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-health:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies from lock
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Unit tests (pytest, fast)
        run: uv run pytest -q

      - name: Health check (G0 source/benchmark health)
        run: uv run qrc-thresher health --out-dir results/health

      - name: Minimal gate profile (G0 must eventually pass)
        run: uv run qrc-thresher gate G0
